    <!-- Lightbox modale full screen -->
    <div class="lightbox" id="lightbox" aria-hidden="true">
        <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
        <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Chiudi">&times;</button>
        <div class="lightbox-content">
            <button type="button" class="lightbox-prev" id="lightboxPrev" aria-label="Foto precedente">&larr;</button>
            <img src="" alt="" class="lightbox-img" id="lightboxImg">
            <button type="button" class="lightbox-next" id="lightboxNext" aria-label="Foto successiva">&rarr;</button>
        </div>
    </div>
