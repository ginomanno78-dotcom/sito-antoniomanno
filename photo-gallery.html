<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antonio Manno - Portfolio Fotografico</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="photo-gallery.css">
</head>
<body>
    <!-- ===== GALLERIA MASONRY ===== -->
    <main id="photoGallery" class="gallery-wrapper">
        <h1 class="gallery-title">Portfolio Fotografico</h1>
        <div class="masonry-grid" role="list">
            <!-- ROW 1: 4 foto quadrate medie (25% ciascuna) -->
            <figure class="masonry-item masonry-item--25" role="listitem" data-index="0">
                <img src="https://picsum.photos/400/400?random=6" alt="Foto 06 - Scatto portfolio" class="masonry-item__img" loading="lazy" width="400" height="400">
            </figure>
            <figure class="masonry-item masonry-item--25" role="listitem" data-index="1">
                <img src="https://picsum.photos/400/400?random=5" alt="Foto 05 - Scatto portfolio" class="masonry-item__img" loading="lazy" width="400" height="400">
            </figure>
            <figure class="masonry-item masonry-item--25" role="listitem" data-index="2">
                <img src="https://picsum.photos/400/400?random=11" alt="Foto 011 - Scatto portfolio" class="masonry-item__img" loading="lazy" width="400" height="400">
            </figure>
            <figure class="masonry-item masonry-item--25" role="listitem" data-index="3">

            </figure>
            <figure class="masonry-item masonry-item--20" role="listitem" data-index="5">
                <img src="https://picsum.photos/400/400?random=4" alt="Foto 04 - Scatto quadrato" class="masonry-item__img" loading="lazy" width="400" height="400">
            </figure>
            <figure class="masonry-item masonry-item--40" role="listitem" data-index="6">
                <img src="https://picsum.photos/600/400?random=12" alt="Foto 012 - Scatto orizzontale" class="masonry-item__img" loading="lazy" width="600" height="400">
            </figure>
            <!-- ROW 3: verticali doppia altezza + 2 medie -->

            <figure class="masonry-item masonry-item--30-tall" role="listitem" data-index="10">

            <!-- ROW 4: 20% + 60% + 20% -->

                <img src="https://picsum.photos/400/400?random=7" alt="Foto 07 - Scatto quadrato" class="masonry-item__img" loading="lazy" width="400" height="400">
            </figure>
            <!-- ROW 5: 4 quadrate 25% -->
            <figure class="masonry-item masonry-item--25" role="listitem" data-index="14">

            </figure>
            <figure class="masonry-item masonry-item--33" role="listitem" data-index="21">

            </figure>
            <figure class="masonry-item masonry-item--20" role="listitem" data-index="25">
                <img src="https://picsum.photos/400/400?random=16" alt="Foto 016 - Scatto quadrato" class="masonry-item__img" loading="lazy" width="400" height="400">
            </figure>
        </div>
    </main>

    <!-- ===== LIGHTBOX MODAL ===== -->
    <div class="lightbox-modal" id="lightboxModal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Visualizzazione foto a schermo intero">
        <div class="lightbox-modal__backdrop" id="lightboxBackdrop"></div>
        <button type="button" class="lightbox-modal__close" id="lightboxClose" aria-label="Chiudi lightbox">&times;</button>
        <div class="lightbox-modal__content">
            <button type="button" class="lightbox-modal__prev" id="lightboxPrev" aria-label="Foto precedente">&larr;</button>
            <img src="" alt="" class="lightbox-modal__img" id="lightboxImg">
            <button type="button" class="lightbox-modal__next" id="lightboxNext" aria-label="Foto successiva">&rarr;</button>
        </div>
    </div>

    <script src="photo-gallery.js"></script>
</body>
</html>
