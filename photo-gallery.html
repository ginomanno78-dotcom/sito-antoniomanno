    <!-- ===== LIGHTBOX MODAL ===== -->
    <div class="lightbox-modal" id="lightboxModal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Visualizzazione foto a schermo intero">
        <div class="lightbox-modal__backdrop" id="lightboxBackdrop"></div>
        <button type="button" class="lightbox-modal__close" id="lightboxClose" aria-label="Chiudi lightbox">&times;</button>
        <div class="lightbox-modal__content">
            <button type="button" class="lightbox-modal__prev" id="lightboxPrev" aria-label="Foto precedente">&larr;</button>
            <img src="" alt="" class="lightbox-modal__img" id="lightboxImg">
            <button type="button" class="lightbox-modal__next" id="lightboxNext" aria-label="Foto successiva">&rarr;</button>
        </div>
    </div>

    <style>
        /* Piedipagina: speculare a style.css (pagina con foglio dedicato) */
        .site-footer {
            padding: 1.25rem 1.5rem;
            background-color: #1a1a1a;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            text-align: left;
        }
        .footer-contatti {
            margin: 0 0 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            text-align: left;
        }
        .footer-contatti-heading {
            margin: 0 0 0.35rem;
            font-family: 'Century Gothic', 'AppleGothic', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 0.02em;
        }
        .footer-contatti-info-label {
            margin: 0 0 0.6rem;
            font-family: 'Century Gothic', 'AppleGothic', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.88);
        }
        .footer-contatti-line {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 0.45rem 0.65rem;
            margin: 0;
            font-family: 'Century Gothic', 'AppleGothic', sans-serif;
            font-size: clamp(0.72rem, 0.5rem + 1.4vw, 1rem);
            color: rgba(255, 255, 255, 0.95);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
        }
        .footer-contatti-inline-group {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }
        .footer-contatti-icon {
            flex-shrink: 0;
            width: 1.35rem;
            height: 1.35rem;
            color: rgba(255, 255, 255, 0.92);
        }
        .footer-contatti-line a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }
        .footer-contatti-line a:hover {
            opacity: 0.85;
        }
        .footer-contatti-sep {
            color: rgba(255, 255, 255, 0.45);
            user-select: none;
        }
        /* Solo smartphone in verticale: due righe tel / email */
        @media (max-width: 640px) and (orientation: portrait) {
            .footer-contatti-line {
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.65rem;
                overflow-x: visible;
            }
            .footer-contatti-sep {
                display: none;
            }
            .footer-contatti-inline-group {
                justify-content: center;
            }
            .footer-contatti-inline-group:first-child {
                white-space: nowrap;
            }
            .footer-contatti-inline-group:last-child a {
                overflow-wrap: anywhere;
                text-align: center;
            }
        }
        /* Copyright su una sola riga su ogni dispositivo */
        .footer-copyright {
            margin: 0;
            padding-top: 0.25rem;
            font-family: 'Century Gothic', 'AppleGothic', sans-serif;
            font-size: clamp(0.5rem, 0.32rem + 1.65vw, 0.9rem);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            width: 100%;
            align-self: center;
            white-space: nowrap;
        }
    </style>
